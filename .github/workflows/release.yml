name: Auto Tag, Release & Update Homebrew

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          # Tag creation goes through `gh api` (no persisted git credentials
          # needed), and SwiftPM package resolution runs arbitrary build-time
          # code — don't leave the token in .git/config for it to read.
          persist-credentials: false

      - name: Extract version
        run: |
          VERSION=$(tr -d '[:space:]' < version.txt)
          if ! printf '%s\n' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Invalid version in version.txt: '$VERSION'" >&2
            exit 1
          fi
          TAG="v${VERSION}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Create tag if new
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # git/ref/tags (singular) is the exact-match endpoint — git/refs/tags
          # is a prefix filter that 200s with [] for a missing tag.
          if gh api "repos/${{ github.repository }}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on remote"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            gh api -X POST "repos/${{ github.repository }}/git/refs" \
              -f ref="refs/tags/${TAG}" -f sha="${GITHUB_SHA}"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if release exists
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release binary
        if: steps.release.outputs.exists == 'false'
        run: swift build --disable-sandbox -c release

      - name: Package binary
        if: steps.release.outputs.exists == 'false'
        run: |
          BUILD_DIR=$(swift build --disable-sandbox --show-bin-path -c release)
          STAGING="lyra-dynamic-wallpaper-${VERSION}-macos-arm64"
          mkdir -p "$STAGING"
          cp "$BUILD_DIR/lyra-dynamic-wallpaper" "$STAGING/"
          codesign --force --sign - "$STAGING/lyra-dynamic-wallpaper"
          find "$BUILD_DIR" -name '*.bundle' -exec cp -R {} "$STAGING/" \;
          # COPYFILE_DISABLE: codesign leaves xattrs that tar would package as
          # ._ AppleDouble files. SHA256 is computed locally so the formula
          # update never races GitHub's CDN propagation of the fresh asset.
          COPYFILE_DISABLE=1 tar czf "${STAGING}.tar.gz" "$STAGING"
          echo "ARCHIVE=${STAGING}.tar.gz" >> "$GITHUB_ENV"
          echo "SHA256=$(shasum -a 256 "${STAGING}.tar.gz" | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        if: steps.release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" "$ARCHIVE" \
            --title "lyra-dynamic-wallpaper $VERSION" \
            --generate-notes

      - name: Update Homebrew formula
        # Keyed on release creation (not tag creation) so a retried run whose
        # tag already exists still updates the formula once the release lands.
        if: steps.release.outputs.exists == 'false'
        # Needs a HOMEBREW_PAT secret with write access to GeneralD/homebrew-tap;
        # continue-on-error keeps the release green while the secret is absent.
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HOMEBREW_PAT }}
          script: |
            const owner = 'GeneralD';
            const repo = 'homebrew-tap';
            const path = 'Formula/lyra-dynamic-wallpaper.rb';
            const tag = process.env.TAG;
            const version = process.env.VERSION;

            // SHA256 was computed locally in the Package step — using it avoids
            // racing the CDN propagation of the just-uploaded asset.
            const sha256 = process.env.SHA256;
            if (!sha256) throw new Error('SHA256 env missing — Package step did not run');
            const assetName = `lyra-dynamic-wallpaper-${version}-macos-arm64.tar.gz`;
            const url = `https://github.com/GeneralD/lyra-dynamic-wallpaper/releases/download/${tag}/${assetName}`;
            console.log(`SHA256: ${sha256}`);

            // Update formula
            const { data: file } = await github.rest.repos.getContent({ owner, repo, path });
            const content = Buffer.from(file.content, 'base64').toString('utf8');
            const updated = content
              .replace(/url "[^"]+"/, `url "${url}"`)
              .replace(/version "[^"]+"/, `version "${version}"`)
              .replace(/sha256 "[^"]+"/, `sha256 "${sha256}"`);

            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `Update lyra-dynamic-wallpaper to ${version}`,
              content: Buffer.from(updated).toString('base64'),
              sha: file.sha,
            });
            console.log(`Updated formula to ${version}`);
